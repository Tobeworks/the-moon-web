name: Build PocketBase Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.pocketbase'
      - 'tools/pocketbase/pb_migrations/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.pocketbase
          push: true
          tags: ghcr.io/tobeworks/the-moon-pocketbase:latest
